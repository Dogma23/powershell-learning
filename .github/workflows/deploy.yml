name: Deploy to GitHub Pages

# Publishes the site every time you push to the main branch.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # the whole repo is the site (static files at the root)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
